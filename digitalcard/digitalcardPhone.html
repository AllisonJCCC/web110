<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Flip Card</title>
<link rel = "stylesheet" href="card.css">
</head>
<body>

<article class="flip-card" id="card">

  <section class="card-side front">
    <div class="content">
      <h2>Allison Hanna</h2>
      <p>I am web developer who specializes in creating web experiences, user experience, and helping people see the power and creativity you can create with HTML and CSS</p>
    </div>
  </section>

  <section class="card-side back">
    <div class="content">
      <h2>Contact Me</h2>
      <p>Feel free to reach me anytime.</p>
      <p> Put your website here or email address</p>
    </div>
  </section>

</article>

<script>
  const card = document.querySelector('.flip-card');

  card.addEventListener('click', function (event) {
    // If the user tapped a link (or something inside a link), ignore it
    if (event.target.closest('a')) return;

    // "this" also works here and refers to the card
    this.classList.toggle('flipped');
  });
  
</script>

</body>
</html>
